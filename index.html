<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Saad WebAR Lab</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        <a-box position="-0.5 0.5 0" rotation="0 45 0" color="#4CC3D9" scale="0.3 0.3 0.3"
               animation="property: rotation; to: 0 405 0; loop: true; dur: 3000">
        </a-box>

        <a-sphere position="0 0.8 -0.5" radius="0.2" color="#EF2D5E">
        </a-sphere>

        <a-cylinder position="0.5 0.5 0" radius="0.2" height="0.8" color="#FFC65D" scale="0.5 0.5 0.5">
        </a-cylinder>

        <a-text value="Saad" position="0 1.5 0" color="red" width="6" align="center"></a-text>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
